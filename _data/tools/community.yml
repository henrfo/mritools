# Community & Organizations

- name: NeuroStars
  description: Q&A forum for neuroinformatics, neuroimaging methods, and tool support.
  url: https://neurostars.org
  date_added: 2026-06-16

- name: NeuroBagel
  description: Federated search across neuroimaging datasets using semantic annotations and a common data model.
  url: https://github.com/neurobagel
  github: neurobagel/bagel-cli
  date_added: 2026-06-16

- name: ENIGMA
  description: Global consortium for large-scale neuroimaging genetics meta-analyses spanning 45+ working groups and countries.
  url: https://enigma.ini.usc.edu
  date_added: 2026-06-16

- name: ENIGMA Protocols
  description: Standardized imaging protocols for cortical, subcortical, DTI, and VBM analysis used across ENIGMA working groups.
  url: https://enigma.ini.usc.edu/protocols/imaging-protocols
  date_added: 2026-06-16

- name: ReproNim
  description: NIH center for reproducible neuroimaging computation — training, tools, and standards.
  url: https://www.repronim.org
  date_added: 2026-06-16

- name: INCF
  description: International Neuroinformatics Coordinating Facility — standards, training, and infrastructure for neuroscience.
  url: https://www.incf.org
  date_added: 2026-06-16

- name: CONP
  description: Canadian Open Neuroscience Platform — data sharing and open science infrastructure for Canadian neuroimaging research.
  url: https://conp.ca
  date_added: 2026-06-16

- name: OHBM Open Science SIG
  description: OHBM special interest group advancing open sharing of ideas, data, and tools in neuroimaging.
  url: https://ohbm-open-science.github.io
  date_added: 2026-06-16

- name: OHBM Brainhack
  description: Annual hackathon for collaborative neuroimaging projects, co-located with the OHBM annual meeting.
  url: https://ohbm.github.io/hackathon
  date_added: 2026-06-16

- name: Neurohackademy
  description: Summer institute in neuroimaging and data science at the University of Washington.
  url: https://neurohackademy.org
  date_added: 2026-06-16

- name: MR-Hub
  description: Community directory of open-source MRI reconstruction and simulation software, maintained by the ISMRM.
  url: https://ismrm.github.io/mrhub
  date_added: 2026-06-16
